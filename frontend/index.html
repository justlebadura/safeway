<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safeway - Visualizador Espacial y Editor de Nodos</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        :root {
            --bg-primary: #0b0f19;
            --bg-secondary: rgba(17, 24, 39, 0.7);
            --bg-card: rgba(31, 41, 55, 0.4);
            --accent: #6366f1;
            --accent-glow: rgba(99, 102, 241, 0.3);
            --accent-success: #10b981;
            --accent-warning: #f59e0b;
            --accent-danger: #ef4444;
            --text-primary: #f3f4f6;
            --text-secondary: #9ca3af;
            --border-color: rgba(255, 255, 255, 0.08);
            --sidebar-width: 420px;
            --font-main: 'Plus Jakarta Sans', sans-serif;
            --font-title: 'Outfit', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            scrollbar-width: thin;
            scrollbar-color: var(--border-color) transparent;
        }

        body {
            font-family: var(--font-main);
            background-color: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* Layout */
        .sidebar {
            width: var(--sidebar-width);
            height: 100%;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border-color);
            backdrop-filter: blur(16px);
            display: flex;
            flex-direction: column;
            z-index: 10;
        }

        .map-container {
            flex: 1;
            height: 100%;
            position: relative;
        }

        #map {
            width: 100%;
            height: 100%;
            background-color: #1a1d24;
        }

        /* Sidebar Header */
        .sidebar-header {
            padding: 24px;
            border-bottom: 1px solid var(--border-color);
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .logo-icon {
            background: linear-gradient(135deg, var(--accent), #4f46e5);
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 15px var(--accent-glow);
        }

        h1 {
            font-family: var(--font-title);
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(to right, #ffffff, #9ca3af);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Controls */
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 12px;
        }

        label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-secondary);
            font-weight: 600;
        }

        select, input, button {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 10px 14px;
            border-radius: 8px;
            font-family: var(--font-main);
            font-size: 14px;
            outline: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        select:focus, input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 8px var(--accent-glow);
        }

        button {
            cursor: pointer;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
            border: none;
        }

        .btn-primary:hover {
            background: #4f46e5;
            box-shadow: 0 0 12px var(--accent-glow);
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: transparent;
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--text-secondary);
        }

        /* Metrics */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 15px;
        }

        .metric-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 10px;
            text-align: center;
        }

        .metric-value {
            font-family: var(--font-title);
            font-size: 18px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .metric-label {
            font-size: 9px;
            color: var(--text-secondary);
            text-transform: uppercase;
        }

        /* Search and List */
        .search-container {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            gap: 8px;
        }

        .search-input-wrapper {
            position: relative;
            flex: 1;
        }

        .search-input-wrapper i {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            pointer-events: none;
        }

        .search-input-wrapper input {
            width: 100%;
            padding-left: 36px;
        }

        .nodes-list {
            flex: 1;
            overflow-y: auto;
            padding: 16px 24px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .node-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 16px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .node-card:hover {
            border-color: rgba(99, 102, 241, 0.4);
            background: rgba(31, 41, 55, 0.6);
            transform: translateY(-2px);
        }

        .node-card.active {
            border-color: var(--accent);
            background: rgba(99, 102, 241, 0.08);
            box-shadow: inset 0 0 10px rgba(99, 102, 241, 0.05);
        }

        .node-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            background: var(--accent-warning);
        }

        .node-card.geocoded::before {
            background: var(--accent-success);
        }

        .node-card.unknown::before {
            background: var(--accent-danger);
        }

        .node-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .node-id {
            font-size: 12px;
            font-weight: 700;
            color: var(--text-secondary);
        }

        .status-badge {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .status-geocoded {
            background: rgba(16, 185, 129, 0.15);
            color: var(--accent-success);
        }

        .status-pending {
            background: rgba(245, 158, 11, 0.15);
            color: var(--accent-warning);
        }

        .status-unknown {
            background: rgba(239, 68, 68, 0.15);
            color: var(--accent-danger);
        }

        .node-address {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .node-details {
            font-size: 11px;
            color: var(--text-secondary);
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        /* Editor Overlay Panel */
        .editor-panel {
            position: absolute;
            top: 0;
            right: -460px;
            width: 440px;
            height: 100%;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(20px);
            border-left: 1px solid var(--border-color);
            z-index: 1000;
            transition: right 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            flex-direction: column;
            box-shadow: -10px 0 30px rgba(0,0,0,0.5);
        }

        .editor-panel.open {
            right: 0;
        }

        .editor-header {
            padding: 24px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .editor-title {
            font-family: var(--font-title);
            font-size: 18px;
            font-weight: 700;
        }

        .close-editor-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            transition: background 0.3s;
        }

        .close-editor-btn:hover {
            background: rgba(255,255,255,0.05);
            color: var(--text-primary);
        }

        .editor-body {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .field-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .field-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .editor-footer {
            padding: 24px;
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 12px;
        }

        .editor-footer button {
            flex: 1;
        }

        /* Custom popups & markers for Leaflet */
        .leaflet-popup-content-wrapper {
            background: #0f172a !important;
            color: #f3f4f6 !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            border-radius: 12px !important;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5) !important;
            padding: 6px;
        }

        .leaflet-popup-tip {
            background: #0f172a !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
        }

        .popup-title {
            font-family: var(--font-title);
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 6px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 4px;
        }

        .popup-text {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 10px;
        }

        .popup-action-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 11px;
            cursor: pointer;
            width: 100%;
            text-align: center;
            font-weight: 600;
        }

        .popup-action-btn:hover {
            background: #4f46e5;
        }

        .custom-div-icon {
            background: var(--accent-success);
            border: 2px solid white;
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(16, 185, 129, 0.4);
        }

        .custom-div-icon-fallback {
            background: var(--accent-warning);
            border: 2px solid white;
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(245, 158, 11, 0.4);
        }

        .custom-div-icon-unknown {
            background: var(--accent-danger);
            border: 2px solid white;
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(239, 68, 68, 0.4);
        }

        .custom-div-icon-active {
            background: #6366f1;
            border: 2px solid white;
            border-radius: 50%;
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.6);
        }

        /* Loading Indicator */
        .loader {
            width: 24px;
            height: 24px;
            border: 3px solid rgba(255,255,255,0.1);
            border-radius: 50%;
            border-top-color: var(--accent);
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(11, 15, 25, 0.8);
            backdrop-filter: blur(8px);
            z-index: 500;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .loading-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
    </style>
</head>
<body>

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay">
        <div class="loader"></div>
        <div style="font-weight: 600; font-size: 14px;" id="loadingText">Cargando datos del dataset...</div>
    </div>

    <!-- Main Sidebar -->
    <div class="sidebar">
        <div class="sidebar-header">
            <div class="logo-container">
                <div class="logo-icon">
                    <i data-lucide="map-pin" style="color: white; width: 20px; height: 20px;"></i>
                </div>
                <h1>Safeway Map Manager</h1>
            </div>

            <div class="control-group">
                <label>Datasets activos</label>
                <div style="display:flex; flex-direction:column; gap:8px; margin-top:4px; background:var(--bg-card); padding:12px; border-radius:8px; border:1px solid var(--border-color);">
                    <label style="display:flex; align-items:center; gap:8px; text-transform:none; font-size:12px; color:var(--text-primary); cursor:pointer;">
                        <input type="checkbox" class="ds-checkbox" value="stq8-drvp" checked style="width:16px; height:16px; accent-color:var(--accent);">
                        Comparendos Norte Santander
                    </label>
                    <label style="display:flex; align-items:center; gap:8px; text-transform:none; font-size:12px; color:var(--text-primary); cursor:pointer;">
                        <input type="checkbox" class="ds-checkbox" value="7cci-nqqb" checked style="width:16px; height:16px; accent-color:var(--accent);">
                        Accidentes Bucaramanga
                    </label>
                    <label style="display:flex; align-items:center; gap:8px; text-transform:none; font-size:12px; color:var(--text-primary); cursor:pointer;">
                        <input type="checkbox" class="ds-checkbox" value="3v2w-chcq" checked style="width:16px; height:16px; accent-color:var(--accent);">
                        Siniestros Bogotá
                    </label>
                    <label style="display:flex; align-items:center; gap:8px; text-transform:none; font-size:12px; color:var(--text-primary); cursor:pointer;">
                        <input type="checkbox" class="ds-checkbox" value="sjpx-eqfp" checked style="width:16px; height:16px; accent-color:var(--accent);">
                        Siniestros Palmira
                    </label>
                    <label style="display:flex; align-items:center; gap:8px; text-transform:none; font-size:12px; color:var(--text-primary); cursor:pointer;">
                        <input type="checkbox" class="ds-checkbox" value="dr5c-eewa" checked style="width:16px; height:16px; accent-color:var(--accent);">
                        Mortalidad Carreteras
                    </label>
                    <label style="display:flex; align-items:center; gap:8px; text-transform:none; font-size:12px; color:var(--text-primary); cursor:pointer;">
                        <input type="checkbox" class="ds-checkbox" value="sefb-a755" checked style="width:16px; height:16px; accent-color:var(--accent);">
                        Accidentes Calle 30 B/quilla
                    </label>
                    <label style="display:flex; align-items:center; gap:8px; text-transform:none; font-size:12px; color:var(--text-primary); cursor:pointer;">
                        <input type="checkbox" class="ds-checkbox" value="ixgc-yijx" checked style="width:16px; height:16px; accent-color:var(--accent);">
                        Lesionados Tránsito Cali
                    </label>
                </div>
            </div>

            <!-- Date and Graph Map Controls -->
            <div class="control-group" style="margin-top: 12px; gap: 8px;">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <label>Filtro Temporal</label>
                    <span id="dateRangeDisplay" style="font-size:11px; color:var(--accent); font-weight:600;">Todos</span>
                </div>
                <div style="display:flex; gap:10px; align-items:center;">
                    <input type="number" id="filterYearMin" placeholder="Desde (ej: 2015)" min="2000" max="2030" style="flex:1; padding:6px 10px; font-size:12px;">
                    <input type="number" id="filterYearMax" placeholder="Hasta (ej: 2026)" min="2000" max="2030" style="flex:1; padding:6px 10px; font-size:12px;">
                </div>
            </div>

            <div class="control-group" style="margin-top: 12px;">
                <div style="display:flex; justify-content:space-between; align-items:center; background:rgba(99,102,241,0.06); padding:10px; border-radius:8px; border:1px solid rgba(99,102,241,0.15);">
                    <label style="display:flex; align-items:center; gap:8px; text-transform:none; font-size:12px; color:var(--text-primary); cursor:pointer;">
                        <input type="checkbox" id="toggleGraphMode" style="width:18px; height:18px; accent-color:var(--accent);">
                        <span style="font-weight:700; color:#c7d2fe;">Modo Mapa de Grafos</span>
                    </label>
                    <i data-lucide="git-fork" style="width:16px; height:16px; color:var(--accent);"></i>
                </div>
            </div>

            <!-- Safest Route Finder Control (Dijkstra Engine) -->
            <div class="control-group" style="margin-top: 12px; background:rgba(255,255,255,0.02); padding:12px; border-radius:8px; border:1px solid var(--border-color); display:flex; flex-direction:column; gap:8px;">
                <label style="color:var(--accent); font-weight:700; font-size:11px;">Rutas Seguras (Dijkstra)</label>
                <div style="display:flex; gap:6px; flex-direction:column;">
                    <input type="text" id="routeStart" placeholder="ID Nodo Origen (ej: node_1)" style="padding:6px; font-size:12px;">
                    <input type="text" id="routeEnd" placeholder="ID Nodo Destino (ej: node_5)" style="padding:6px; font-size:12px;">
                </div>
                <div style="display:flex; justify-content:space-between; align-items:center; margin-top:2px;">
                    <label style="display:flex; align-items:center; gap:6px; text-transform:none; font-size:11px; cursor:pointer;">
                        <input type="checkbox" id="routeRain" style="width:14px; height:14px; accent-color:var(--accent);">
                        ¿Lluvia Activa?
                    </label>
                    <input type="number" id="routeHour" placeholder="Hora (0-23)" min="0" max="23" style="width:80px; padding:4px; font-size:11px;">
                </div>
                <button id="btnFindRoute" class="btn-primary" style="padding:8px; font-size:12px; margin-top:4px;">
                    <i data-lucide="navigation" style="width:14px; height:14px;"></i> Trazar Ruta Segura
                </button>
                <div id="routeResults" style="font-size:11px; color:var(--text-secondary); line-height:1.4; display:none; margin-top:4px;">
                    <strong>Puntuación de Peligro:</strong> <span id="routeDangerVal" style="color:var(--accent-danger); font-weight:700;">-</span>
                </div>
            </div>

            <div class="metrics-grid">
                <div class="metric-card">
                    <div id="metricTotal" class="metric-value">0</div>
                    <div class="metric-label">Registros</div>
                </div>
                <div class="metric-card">
                    <div id="metricGeocoded" class="metric-value">0</div>
                    <div class="metric-label">Mapeados</div>
                </div>
                <div class="metric-card" style="border-color: rgba(245, 158, 11, 0.4);">
                    <div id="metricFallback" class="metric-value" style="color: #f59e0b;">0</div>
                    <div class="metric-label" style="color: #f59e0b;">Fallback</div>
                </div>
            </div>
        </div>

        <div class="search-container">
            <div class="search-input-wrapper">
                <i data-lucide="search" style="width: 16px; height: 16px;"></i>
                <input type="text" id="searchInput" placeholder="Buscar por dirección o id...">
            </div>
            <button id="btnAutoGeocode" class="btn-secondary" title="Geolocalizar registros pendientes automáticamente"><i data-lucide="refresh-cw" style="width: 16px; height: 16px;"></i></button>
        </div>

        <div id="nodesList" class="nodes-list">
            <!-- Dynamic list cards go here -->
        </div>
    </div>

    <!-- Map Viewport -->
    <div class="map-container">
        <div id="map"></div>
    </div>

    <!-- Slide-over Editor Panel -->
    <div id="editorPanel" class="editor-panel">
        <div class="editor-header">
            <div class="editor-title">Editar Nodo Espacial</div>
            <button id="closeEditorBtn" class="close-editor-btn">
                <i data-lucide="x" style="width: 20px; height: 20px;"></i>
            </button>
        </div>
        <div class="editor-body">
            <div class="field-group">
                <label>ID Registro</label>
                <input type="text" id="editId" readonly style="opacity: 0.6; cursor: not-allowed;">
            </div>

            <div class="field-row">
                <div class="field-group">
                    <label>Fecha</label>
                    <input type="text" id="editDate" readonly style="opacity: 0.6; cursor: not-allowed;">
                </div>
                <div class="field-group">
                    <label>Hora</label>
                    <input type="text" id="editTime" readonly style="opacity: 0.6; cursor: not-allowed;">
                </div>
            </div>

            <div class="field-group">
                <label>Vehículos / Afectación</label>
                <input type="text" id="editVehicles" readonly style="opacity: 0.6; cursor: not-allowed; color: var(--accent);">
            </div>

            <div class="field-group">
                <label>Ubicación Original</label>
                <input type="text" id="editOriginalLocation" readonly style="opacity: 0.6; cursor: not-allowed;">
            </div>

            <div class="field-group">
                <label>Ubicación Limpia / Normalizada</label>
                <input type="text" id="editCleanLocation">
            </div>

            <div style="border-top: 1px solid var(--border-color); margin: 10px 0;"></div>
            <h3 style="font-family: var(--font-title); font-size: 14px; color: var(--accent);">Entidades Extraídas</h3>

            <div class="field-group">
                <label>Vía Principal</label>
                <input type="text" id="editViaPrincipal">
            </div>

            <div class="field-group">
                <label>Número o Kilómetro</label>
                <input type="text" id="editNumeroKm">
            </div>

            <div class="field-group">
                <label>Referencia Semántica</label>
                <input type="text" id="editReferenciaSemantica">
            </div>

            <div class="field-group">
                <label>Barrio o Municipio</label>
                <input type="text" id="editBarrioMunicipio">
            </div>

            <div style="border-top: 1px solid var(--border-color); margin: 10px 0;"></div>
            <h3 style="font-family: var(--font-title); font-size: 14px; color: var(--accent);">Coordenadas Geográficas</h3>
            
            <div class="field-row">
                <div class="field-group">
                    <label>Latitud</label>
                    <input type="number" step="any" id="editLat">
                </div>
                <div class="field-group">
                    <label>Longitud</label>
                    <input type="number" step="any" id="editLng">
                </div>
            </div>
            <button id="btnGeocodeSingle" class="btn-secondary" style="margin-top: 6px;"><i data-lucide="compass"></i> Geolocalizar con Nominatim</button>
        </div>
        <div class="editor-footer">
            <button id="cancelEditBtn" class="btn-secondary">Cancelar</button>
            <button id="saveEditBtn" class="btn-primary">Guardar Cambios</button>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <script>
        // Init Lucide
        lucide.createIcons();

        // Application State
        let nodes = [];
        let filteredNodes = [];
        let selectedNode = null;
        let map = null;
        let markers = {};
        
        // Initialize Map
        function initMap() {
            // Center in Cucuta, Norte de Santander
            map = L.map('map', {
                zoomControl: false
            }).setView([7.89391, -72.50782], 13);
            
            // Add zoom control at bottom right
            L.control.zoom({ position: 'bottomright' }).addTo(map);

            // Dark Matter Theme Tiles
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
                subdomains: 'abcd',
                maxZoom: 20
            }).addTo(map);
        }

        // Fetch dataset records from backend API (Standardized Combined Table Schema)
        async function fetchDataset() {
            showLoading("Cargando registros de datasets...");
            try {
                // Get checked datasets
                const checkedCheckboxes = document.querySelectorAll('.ds-checkbox:checked');
                const checkedIds = Array.from(checkedCheckboxes).map(cb => cb.value);
                
                if (checkedIds.length === 0) {
                    nodes = [];
                    filteredNodes = [];
                    updateMetrics();
                    renderNodesList();
                    renderMarkersOnMap();
                    hideLoading();
                    return;
                }
                
                let url = `/datasets/combined?dataset_ids=${checkedIds.join(',')}&max_rows=200`;
                const res = await fetch(url);
                const data = await res.json();
                
                const recordsTable = data.tables.records || [];
                const cleanTable = data.tables.records_cleaned || [];
                const extractionsTable = data.tables.extracciones || [];
                
                nodes = recordsTable.map((row) => {
                    const cleanRow = cleanTable.find(c => c.record_id === row.id) || {};
                    const extr = extractionsTable.find(e => e.record_id === row.id) || {};
                    
                    return {
                        id: row.row_id, // unique dataset:id key
                        raw_id: row.id, // global unique integer index
                        dataset_id: row.dataset_id,
                        data_original: row.data_original || {},
                        data_limpia: cleanRow.data_limpia || {},
                        original_location: row.location || '',
                        clean_location: cleanRow.clean_location || '',
                        extraccion: extr.extraccion || null,
                        latitude: row.latitude || null,
                        longitude: row.longitude || null,
                        is_fallback_coord: row.is_fallback_coord || false,
                        date_iso: row.date_iso || '',
                        time: row.time || '',
                        vehicles: row.vehicles || 'NO REGISTRA'
                    };
                });

                applyTemporalAndSearchFilters();
                updateMetrics();
                
                // Autofit map to show nodes
                if (nodes.length > 0) {
                    const mapped = nodes.filter(n => n.latitude !== null && n.longitude !== null);
                    if (mapped.length > 0) {
                        const bounds = mapped.map(n => [n.latitude, n.longitude]);
                        map.fitBounds(bounds, { padding: [50, 50], maxZoom: 15 });
                    }
                }
            } catch (err) {
                console.error("Error fetching datasets:", err);
                alert("Error al conectar con la API de Safeway.");
            } finally {
                hideLoading();
            }
        }

        // Metrics Calculation
        function updateMetrics() {
            document.getElementById('metricTotal').innerText = nodes.length;
            const geocodedCount = nodes.filter(n => n.latitude !== null && !n.is_fallback_coord).length;
            document.getElementById('metricGeocoded').innerText = geocodedCount;
            
            const fallbackCount = nodes.filter(n => n.latitude !== null && n.is_fallback_coord).length;
            document.getElementById('metricFallback').innerText = fallbackCount;
        }

        // Render Sidebar List
        function renderNodesList() {
            const container = document.getElementById('nodesList');
            container.innerHTML = '';
            
            if (filteredNodes.length === 0) {
                container.innerHTML = `<div style="text-align:center; color:var(--text-secondary); margin-top:20px; font-size:14px;">No se encontraron registros</div>`;
                return;
            }

            filteredNodes.forEach(node => {
                const card = document.createElement('div');
                card.className = 'node-card';
                if (selectedNode && selectedNode.id === node.id) {
                    card.classList.add('active');
                }
                
                let statusText = 'Estimado';
                let statusClass = 'status-pending';
                
                if (node.latitude !== null && !node.is_fallback_coord) {
                    statusText = 'Mapeado';
                    statusClass = 'status-geocoded';
                    card.classList.add('geocoded');
                } else if (node.is_fallback_coord) {
                    statusText = 'Fallback';
                    statusClass = 'status-pending';
                }

                const dispAddress = node.clean_location || node.original_location || "Sin dirección";

                card.innerHTML = `
                    <div class="node-card-header">
                        <span class="node-id"># ${node.id}</span>
                        <span class="status-badge ${statusClass}">${statusText}</span>
                    </div>
                    <div class="node-address" title="${dispAddress}">${dispAddress}</div>
                    <div class="node-details">
                        <div><strong>Vía:</strong> ${getExtVal(node, 'VIA_PRINCIPAL')}</div>
                        <div><strong>Barrio/Municipio:</strong> ${getExtVal(node, 'BARRIO_O_MUNICIPIO')}</div>
                        <div><strong>Fecha/Hora:</strong> ${node.date_iso || '-'} ${node.time || ''}</div>
                        <div><strong>Vehículos/Afectados:</strong> <span style="color:var(--accent); font-weight:600;">${node.vehicles}</span></div>
                    </div>
                `;

                card.addEventListener('click', () => {
                    selectNode(node, true);
                });

                container.appendChild(card);
            });
        }

        function getExtVal(node, key) {
            if (!node.extraccion || Array.isArray(node.extraccion)) return '-';
            return node.extraccion[key] && node.extraccion[key].value ? node.extraccion[key].value : '-';
        }

        // Render Map Markers
        function renderMarkersOnMap() {
            // Clear existing markers
            Object.values(markers).forEach(m => map.removeLayer(m));
            markers = {};

            const isGraphMode = document.getElementById('toggleGraphMode') && document.getElementById('toggleGraphMode').checked;

            nodes.forEach(node => {
                if (node.latitude !== null && node.longitude !== null) {
                    const lat = parseFloat(node.latitude);
                    const lng = parseFloat(node.longitude);
                    
                    if (isNaN(lat) || isNaN(lng)) return;

                    // If in Graph Mode, we only draw structural intersections and street segments.
                    // Point markers are bypassed to show the coupled network clearly.
                    if (isGraphMode) {
                        return;
                    }

                    let markerClass = 'custom-div-icon'; // Default geocoded
                    if (selectedNode && selectedNode.id === node.id) {
                        markerClass = 'custom-div-icon-active';
                    } else if (node.is_fallback_coord) {
                        markerClass = 'custom-div-icon-fallback';
                    }

                    const marker = L.marker([lat, lng], {
                        draggable: true,
                        icon: L.divIcon({
                            className: markerClass,
                            iconSize: [12, 12]
                        })
                    });

                    const dispAddress = node.clean_location || node.original_location;
                    const isFallback = node.is_fallback_coord;
                    const popupContent = document.createElement('div');
                    popupContent.innerHTML = `
                        <div class="popup-title">Registro #${node.id} ${isFallback ? '<span style="color:#f59e0b; font-size:10px; font-weight:bold; margin-left:8px;">⚠️ Fallback</span>' : ''}</div>
                        <div class="popup-text" style="margin-bottom:4px;">${dispAddress}</div>
                        <div style="font-size:10px; color:var(--text-secondary); margin-bottom:8px;">
                            Vehículos: ${node.vehicles}
                        </div>
                        ${isFallback ? '<div style="font-size:10px; color:#f59e0b; font-weight:bold; margin-bottom:8px;">⚠️ Ubicación estimada (coordenada fallback)</div>' : ''}
                    `;
                    const btn = document.createElement('button');
                    btn.className = 'popup-action-btn';
                    btn.innerText = 'Editar Datos';
                    btn.onclick = () => selectNode(node, false, true);
                    popupContent.appendChild(btn);

                    marker.bindPopup(popupContent);

                    // Dragend listener to update coordinates
                    marker.on('dragend', async function (event) {
                        const position = marker.getLatLng();
                        node.latitude = position.lat;
                        node.longitude = position.lng;
                        node.is_fallback_coord = false; // Manually placed/edited
                        
                        await saveNodeData(node);
                        updateMetrics();
                        renderNodesList();
                    });

                    marker.on('click', () => {
                        selectNode(node, false);
                    });

                    marker.addTo(map);
                    markers[node.id] = marker;
                }
            });

            // Re-render graph network visualization
            buildAndRenderGraph();
        }

        // Select Node and center map
        function selectNode(node, centerMap = true, openEditor = false) {
            selectedNode = node;
            
            // Highlight card in sidebar list
            const cards = document.querySelectorAll('.node-card');
            const index = filteredNodes.findIndex(n => n.id === node.id);
            cards.forEach((c, idx) => {
                if (idx === index) {
                    c.classList.add('active');
                    c.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                } else {
                    c.classList.remove('active');
                }
            });

            // Highlight active marker on map
            Object.keys(markers).forEach(id => {
                const m = markers[id];
                if (id === node.id) {
                    m.setIcon(L.divIcon({ className: 'custom-div-icon-active', iconSize: [14, 14] }));
                    m.setZIndexOffset(1000);
                } else {
                    let n = nodes.find(x => x.id === id);
                    let markerClass = 'custom-div-icon';
                    if (n && n.is_fallback_coord) {
                        markerClass = 'custom-div-icon-fallback';
                    }
                    m.setIcon(L.divIcon({ className: markerClass, iconSize: [12, 12] }));
                    m.setZIndexOffset(0);
                }
            });

            if (centerMap && node.latitude !== null && node.longitude !== null) {
                map.setView([node.latitude, node.longitude], 16);
                if (markers[node.id]) {
                    markers[node.id].openPopup();
                }
            }

            if (openEditor) {
                populateEditor(node);
                document.getElementById('editorPanel').classList.add('open');
            }
        }

        // Populate editor panel fields
        function populateEditor(node) {
            document.getElementById('editId').value = node.id;
            document.getElementById('editOriginalLocation').value = node.original_location || '';
            document.getElementById('editCleanLocation').value = node.clean_location || '';
            document.getElementById('editDate').value = node.date_iso || '-';
            document.getElementById('editTime').value = node.time || '-';
            document.getElementById('editVehicles').value = node.vehicles || 'NO REGISTRA';

            document.getElementById('editViaPrincipal').value = (node.extraccion && node.extraccion.VIA_PRINCIPAL) ? node.extraccion.VIA_PRINCIPAL.value || '' : '';
            document.getElementById('editNumeroKm').value = (node.extraccion && node.extraccion.NUMERO_O_KM) ? node.extraccion.NUMERO_O_KM.value || '' : '';
            document.getElementById('editReferenciaSemantica').value = (node.extraccion && node.extraccion.REFERENCIA_SEMANTICA) ? node.extraccion.REFERENCIA_SEMANTICA.value || '' : '';
            document.getElementById('editBarrioMunicipio').value = (node.extraccion && node.extraccion.BARRIO_O_MUNICIPIO) ? node.extraccion.BARRIO_O_MUNICIPIO.value || '' : '';

            document.getElementById('editLat').value = node.latitude !== null ? node.latitude : '';
            document.getElementById('editLng').value = node.longitude !== null ? node.longitude : '';
        }

        // Geolocate via Nominatim OSM API
        async function geocodeAddress(address) {
            if (!address) return null;
            const query = `${address}, Colombia`;
            try {
                const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=1`, {
                    headers: {
                        'User-Agent': 'SafewayAddressExtractor/1.0 (lebadura)'
                    }
                });
                const data = await response.json();
                if (data && data.length > 0) {
                    return {
                        lat: parseFloat(data[0].lat),
                        lon: parseFloat(data[0].lon)
                    };
                }
            } catch (err) {
                console.error("Geocoding API error:", err);
            }
            return null;
        }

        // Save node data to FastAPI Backend
        async function saveNodeData(node) {
            const parts = node.id.split(':');
            const datasetId = parts[0];
            const originalRowId = parts.slice(1).join(':');
            
            let locFieldName = 'lugar';
            if (datasetId === '7cci-nqqb') locFieldName = 'barrio';
            else if (datasetId === '3v2w-chcq') locFieldName = 'DIRECCION';
            else if (datasetId === 'sjpx-eqfp') locFieldName = 'direccion';
            else if (datasetId === '3v2w-chcq') locFieldName = 'DIRECCION';
            else if (datasetId === 'sjpx-eqfp') locFieldName = 'direccion';
            else if (datasetId === 'dr5c-eewa') locFieldName = 'tramo';
            else if (datasetId === 'sefb-a755') locFieldName = 'sitio_exacto_accidente';
            else if (datasetId === 'ixgc-yijx') locFieldName = 'Dirección_Reporte';
            
            const payload = {
                data_limpia: {
                    ...node.data_limpia,
                    [locFieldName]: node.clean_location
                },
                extraccion: {
                    VIA_PRINCIPAL: { value: node.extraccion.VIA_PRINCIPAL?.value || null, confidence: node.extraccion.VIA_PRINCIPAL?.confidence || 1.0 },
                    NUMERO_O_KM: { value: node.extraccion.NUMERO_O_KM?.value || null, confidence: node.extraccion.NUMERO_O_KM?.confidence || 1.0 },
                    REFERENCIA_SEMANTICA: { value: node.extraccion.REFERENCIA_SEMANTICA?.value || null, confidence: node.extraccion.REFERENCIA_SEMANTICA?.confidence || 1.0 },
                    BARRIO_O_MUNICIPIO: { value: node.extraccion.BARRIO_O_MUNICIPIO?.value || null, confidence: node.extraccion.BARRIO_O_MUNICIPIO?.confidence || 1.0 }
                },
                latitude: node.latitude,
                longitude: node.longitude
            };

            try {
                const res = await fetch(`/datasets/${datasetId}/nodes/${originalRowId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                return res.ok;
            } catch (err) {
                console.error("Error saving node data:", err);
                return false;
            }
        }

        // Apply search and temporal range filters dynamically
        function applyTemporalAndSearchFilters() {
            const searchVal = document.getElementById('searchInput').value.toLowerCase().trim();
            const minYearVal = parseInt(document.getElementById('filterYearMin').value);
            const maxYearVal = parseInt(document.getElementById('filterYearMax').value);

            let rangeText = "Todos";
            if (!isNaN(minYearVal) && !isNaN(maxYearVal)) {
                rangeText = `${minYearVal} - ${maxYearVal}`;
            } else if (!isNaN(minYearVal)) {
                rangeText = `>= ${minYearVal}`;
            } else if (!isNaN(maxYearVal)) {
                rangeText = `<= ${maxYearVal}`;
            }
            document.getElementById('dateRangeDisplay').innerText = rangeText;

            filteredNodes = nodes.filter(n => {
                // 1. Text filter
                if (searchVal !== '') {
                    const matchText = n.id.toString().toLowerCase().includes(searchVal) || 
                                      (n.clean_location && n.clean_location.toLowerCase().includes(searchVal)) ||
                                      (n.original_location && n.original_location.toLowerCase().includes(searchVal));
                    if (!matchText) return false;
                }

                // 2. Year filter
                if (n.date_iso) {
                    // extract year (first 4 characters or match digits)
                    const match = n.date_iso.match(/(\d{4})/);
                    if (match) {
                        const year = parseInt(match[1]);
                        if (!isNaN(minYearVal) && year < minYearVal) return false;
                        if (!isNaN(maxYearVal) && year > maxYearVal) return false;
                    }
                }
                return true;
            });

            renderNodesList();
            renderMarkersOnMap();
        }

        // Dynamic Graph Coupling & Visual Risk Index Rendering
        let graphPolylines = [];
        let graphNodes = [];
        function buildAndRenderGraph() {
            // Remove existing structural nodes and edges from Leaflet map
            graphPolylines.forEach(p => map.removeLayer(p));
            graphPolylines = [];
            graphNodes.forEach(n => map.removeLayer(n));
            graphNodes = [];

            const isGraphMode = document.getElementById('toggleGraphMode').checked;
            if (!isGraphMode) return;

            // Step 1: Identify structural street nodes / corners / intersections from geocoded nodes.
            // A structural intersection represents a permanent street location where one or more accidents were coupled/snapped.
            const mappedAccidents = filteredNodes.filter(n => n.latitude !== null && n.longitude !== null && !n.is_fallback_coord);
            const corners = []; // array of {lat, lng, streetName, accidents: []}

            mappedAccidents.forEach(acc => {
                let coupled = false;
                // Proximity threshold of ~40 meters (~0.0004 degrees)
                for (let corner of corners) {
                    const latDiff = Math.abs(corner.lat - acc.latitude);
                    const lngDiff = Math.abs(corner.lng - acc.longitude);
                    if (latDiff < 0.0004 && lngDiff < 0.0004) {
                        corner.accidents.push(acc);
                        // Recalculate centroid slightly
                        const count = corner.accidents.length;
                        corner.lat = (corner.lat * (count - 1) + acc.latitude) / count;
                        corner.lng = (corner.lng * (count - 1) + acc.longitude) / count;
                        coupled = true;
                        break;
                    }
                }
                if (!coupled) {
                    corners.push({
                        lat: acc.latitude,
                        lng: acc.longitude,
                        streetName: getExtVal(acc, 'VIA_PRINCIPAL') || acc.clean_location || "Esquina / Tramo de Calle",
                        accidents: [acc]
                    });
                }
            });

            // Step 2: Connect corners that share the same street name to represent structural segments (Aristas/Tramos)
            for (let i = 0; i < corners.length; i++) {
                const cornerA = corners[i];
                for (let j = i + 1; j < corners.length; j++) {
                    const cornerB = corners[j];
                    
                    let shareStreet = false;
                    const nameA = cornerA.streetName.toLowerCase();
                    const nameB = cornerB.streetName.toLowerCase();
                    if (nameA !== "esquina / tramo de calle" && nameB !== "esquina / tramo de calle") {
                        const wordsA = nameA.split(/\s+/);
                        const wordsB = nameB.split(/\s+/);
                        const common = wordsA.filter(w => w.length > 2 && w !== "calle" && w !== "carrera" && w !== "avenida" && wordsB.includes(w));
                        if (common.length > 0) {
                            shareStreet = true;
                        }
                    }

                    const dist = Math.sqrt(Math.pow(cornerA.lat - cornerB.lat, 2) + Math.pow(cornerA.lng - cornerB.lng, 2));
                    if (shareStreet && dist < 0.015) { // connected within 1.5km
                        const polyline = L.polyline([[cornerA.lat, cornerA.lng], [cornerB.lat, cornerB.lng]], {
                            color: 'rgba(99, 102, 241, 0.4)',
                            weight: 3,
                            opacity: 0.6,
                            dashArray: '4, 8'
                        });
                        polyline.addTo(map);
                        graphPolylines.push(polyline);
                    }
                }
            }

            // Step 3: Draw corners/nodes and calculate their dynamic Risk Index (Valor de Accidentalidad)
            corners.forEach((corner, idx) => {
                let riskIndex = 0.0;
                let detailsHtml = "";
                let fatalCount = 0;
                let injuredCount = 0;

                corner.accidents.forEach(acc => {
                    // a) Temporal decay factor: compensation based on proximity to 2026.
                    // Accidents from 2026 get full value (1.0). Past years decay exponentially (e.g. 0.7^(2026 - year)).
                    let year = 2026; // Reference Year
                    if (acc.date_iso) {
                        const m = acc.date_iso.match(/(\d{4})/);
                        if (m) year = parseInt(m[1]);
                    }
                    const yearsElapsed = Math.max(0, 2026 - year);
                    const temporalDecay = Math.pow(0.75, yearsElapsed);

                    // b) Brutality / Severity factor:
                    // Check if deaths, injuries, or class indicates higher gravity.
                    let brutality = 1.0; 
                    const vehiclesUpper = acc.vehicles.toUpperCase();
                    if (vehiclesUpper.includes("MUERTO") || vehiclesUpper.includes("FALLECIDO") || vehiclesUpper.includes("MORTAL")) {
                        brutality = 4.0;
                        fatalCount++;
                    } else if (vehiclesUpper.includes("HERIDO") || vehiclesUpper.includes("LESIONADO")) {
                        brutality = 2.0;
                        injuredCount++;
                    }

                    // c) Time of day offset (nighttime / rush hours increase weight)
                    let timeWeight = 1.0;
                    if (acc.time) {
                        const tm = acc.time.match(/^(\d{2})/);
                        if (tm) {
                            const hr = parseInt(tm[1]);
                            if (hr >= 18 || hr <= 5) { // Nighttime risk
                                timeWeight = 1.3;
                            } else if ((hr >= 7 && hr <= 9) || (hr >= 12 && hr <= 14) || (hr >= 17 && hr <= 19)) { // Rush hours
                                timeWeight = 1.15;
                            }
                        }
                    }

                    // d) Environmental / Weather modifier (Lluvia/Clima proxy)
                    // If weather text mentions rainy condition or it is a typical wet month (Oct, Nov) or specific attributes
                    let weatherWeight = 1.0;
                    let weatherLabel = "Despejado / Seco";
                    if (acc.data_original) {
                        const valuesStr = JSON.stringify(acc.data_original).toUpperCase();
                        if (valuesStr.includes("LLUVIA") || valuesStr.includes("LLUVIOSO") || valuesStr.includes("HUMEDO")) {
                            weatherWeight = 1.4;
                            weatherLabel = "Lluvia / Humedad";
                        }
                    }

                    const accidentRisk = temporalDecay * brutality * timeWeight * weatherWeight;
                    riskIndex += accidentRisk;

                    detailsHtml += `
                        <div style="border-top: 1px solid rgba(255,255,255,0.08); margin-top: 6px; padding-top: 6px; font-size: 10px; line-height:1.4;">
                            <strong>Incidente #${acc.id}</strong> (Riesgo: ${accidentRisk.toFixed(2)})<br>
                            📅 <strong>Fecha:</strong> ${acc.date_iso || 'N/R'} | ⏰ <strong>Hora:</strong> ${acc.time || 'N/R'}<br>
                            ☁️ <strong>Clima:</strong> ${weatherLabel}<br>
                            🚗 <strong>Detalle:</strong> <span style="color:var(--text-secondary);">${acc.vehicles}</span>
                        </div>
                    `;
                });

                // e) Local density / Frequency compensation
                const frequencyModifier = 1.0 + (corner.accidents.length * 0.15);
                riskIndex = riskIndex * frequencyModifier;
                riskIndex = Math.round(riskIndex * 100) / 100;

                // Visual markers scaling based on calculated Risk Index
                let nodeColor = '#10b981'; // Green (Safe/Low Risk)
                if (riskIndex > 10) nodeColor = '#ef4444'; // Red (High Risk)
                else if (riskIndex > 4) nodeColor = '#f59e0b'; // Orange (Medium Risk)

                const radius = Math.min(6 + riskIndex * 1.5, 30);

                const circleNode = L.circleMarker([corner.lat, corner.lng], {
                    radius: radius,
                    fillColor: nodeColor,
                    color: '#ffffff',
                    weight: 1.5,
                    opacity: 0.9,
                    fillOpacity: 0.75
                });

                circleNode.bindPopup(`
                    <div style="font-family:var(--font-title); font-weight:700; color:var(--text-primary); font-size:13px; margin-bottom:5px;">
                        Esquina: ${corner.streetName}
                    </div>
                    <div style="font-size:11px; color:var(--text-secondary); line-height:1.5; margin-bottom:8px;">
                        <strong>Valor de Accidentalidad:</strong> <span style="color:${nodeColor}; font-size:12px; font-weight:700;">${riskIndex}</span><br>
                        <strong>Accidentes Acoplados:</strong> ${corner.accidents.length}<br>
                        <strong>Fatalidades / Lesionados:</strong> ${fatalCount} / ${injuredCount}<br>
                    </div>
                    <div style="max-height: 180px; overflow-y: auto; padding-right: 4px;">
                        ${detailsHtml}
                    </div>
                `);

                circleNode.addTo(map);
                graphNodes.push(circleNode);
            });
        }

        // Event Listeners Setup
        function setupEventListeners() {
            // Listen to checkbox changes
            document.querySelectorAll('.ds-checkbox').forEach(cb => {
                cb.addEventListener('change', () => {
                    selectedNode = null;
                    document.getElementById('editorPanel').classList.remove('open');
                    fetchDataset();
                });
            });

            // Search and Date Filter Listeners
            document.getElementById('searchInput').addEventListener('input', applyTemporalAndSearchFilters);
            document.getElementById('filterYearMin').addEventListener('input', applyTemporalAndSearchFilters);
            document.getElementById('filterYearMax').addEventListener('input', applyTemporalAndSearchFilters);
            
            document.getElementById('toggleGraphMode').addEventListener('change', () => {
                renderMarkersOnMap();
            });

            // Close Editor
            document.getElementById('closeEditorBtn').addEventListener('click', () => {
                document.getElementById('editorPanel').classList.remove('open');
            });
            document.getElementById('cancelEditBtn').addEventListener('click', () => {
                document.getElementById('editorPanel').classList.remove('open');
            });

            // Geocode Single Address button in Editor
            document.getElementById('btnGeocodeSingle').addEventListener('click', async () => {
                const cleanLoc = document.getElementById('editCleanLocation').value;
                const via = document.getElementById('editViaPrincipal').value;
                const num = document.getElementById('editNumeroKm').value;
                const muni = document.getElementById('editBarrioMunicipio').value;
                
                let searchText = cleanLoc;
                if (!searchText && via) {
                    searchText = `${via} ${num} ${muni}`;
                }

                showLoading("Geolocalizando dirección...");
                const coords = await geocodeAddress(searchText);
                hideLoading();

                if (coords) {
                    document.getElementById('editLat').value = coords.lat;
                    document.getElementById('editLng').value = coords.lon;
                } else {
                    alert("No se pudieron encontrar coordenadas para esta dirección.");
                }
            });

            // Save Edits Form Button
            document.getElementById('saveEditBtn').addEventListener('click', async () => {
                if (!selectedNode) return;

                selectedNode.clean_location = document.getElementById('editCleanLocation').value;
                
                const viaVal = document.getElementById('editViaPrincipal').value;
                const numVal = document.getElementById('editNumeroKm').value;
                const refVal = document.getElementById('editReferenciaSemantica').value;
                const barVal = document.getElementById('editBarrioMunicipio').value;

                selectedNode.extraccion = {
                    VIA_PRINCIPAL: { value: viaVal || null, confidence: 1.0 },
                    NUMERO_O_KM: { value: numVal || null, confidence: 1.0 },
                    REFERENCIA_SEMANTICA: { value: refVal || null, confidence: 1.0 },
                    BARRIO_O_MUNICIPIO: { value: barVal || null, confidence: 1.0 }
                };

                const latVal = parseFloat(document.getElementById('editLat').value);
                const lngVal = parseFloat(document.getElementById('editLng').value);

                selectedNode.latitude = !isNaN(latVal) ? latVal : null;
                selectedNode.longitude = !isNaN(lngVal) ? lngVal : null;
                selectedNode.is_fallback_coord = false; // Manually placed

                showLoading("Guardando cambios...");
                const success = await saveNodeData(selectedNode);
                hideLoading();

                if (success) {
                    document.getElementById('editorPanel').classList.remove('open');
                    await fetchDataset();
                    const updatedNode = nodes.find(n => n.id === selectedNode.id);
                    if (updatedNode) {
                        selectNode(updatedNode, true);
                    }
                } else {
                    alert("Error al guardar los cambios en el servidor.");
                }
            });

            // Auto-Geocode missing coordinates
            document.getElementById('btnAutoGeocode').addEventListener('click', async () => {
                const unmapped = nodes.filter(n => n.is_fallback_coord);
                if (unmapped.length === 0) {
                    alert("Todos los registros válidos ya tienen coordenadas precisas asignadas.");
                    return;
                }

                if (!confirm(`Se geolocalizarán ${unmapped.length} registros usando la API Nominatim. Este proceso puede tardar unos momentos (1s por registro). ¿Desea continuar?`)) {
                    return;
                }

                showLoading("Geolocalizando registros pendientes...");
                let successCount = 0;

                for (let i = 0; i < unmapped.length; i++) {
                    const node = unmapped[i];
                    document.getElementById('loadingText').innerText = `Geolocalizando #${node.id} (${i + 1}/${unmapped.length})...`;
                    
                    let address = node.clean_location;
                    if (!address && node.extraccion) {
                        const via = node.extraccion.VIA_PRINCIPAL?.value || '';
                        const num = node.extraccion.NUMERO_O_KM?.value || '';
                        const muni = node.extraccion.BARRIO_O_MUNICIPIO?.value || '';
                        address = `${via} ${num} ${muni}`.trim();
                    }

                    if (address) {
                        const coords = await geocodeAddress(address);
                        if (coords) {
                            node.latitude = coords.lat;
                            node.longitude = coords.lon;
                            node.is_fallback_coord = false;
                            await saveNodeData(node);
                            successCount++;
                        }
                    }
                    await new Promise(r => setTimeout(r, 1000));
                }

                hideLoading();
                alert(`Proceso finalizado. Se ubicaron exitosamente ${successCount} de ${unmapped.length} registros.`);
                fetchDataset();
            });

            // Dijkstra Safest Route Finder Button Trigger
            let routePolyline = null;
            document.getElementById('btnFindRoute').addEventListener('click', async () => {
                const startNodeId = document.getElementById('routeStart').value.trim();
                const endNodeId = document.getElementById('routeEnd').value.trim();
                const rain = document.getElementById('routeRain').checked;
                const hourVal = document.getElementById('routeHour').value;
                const hour = hourVal !== "" ? parseInt(hourVal) : null;

                if (!startNodeId || !endNodeId) {
                    alert("Por favor ingrese tanto el ID de Origen como de Destino.");
                    return;
                }

                showLoading("Calculando la ruta más segura...");
                try {
                    // Collect active checkboxes
                    const checkedCheckboxes = document.querySelectorAll('.ds-checkbox:checked');
                    const checkedIds = Array.from(checkedCheckboxes).map(cb => cb.value);

                    let url = `/datasets/combined/route?dataset_ids=${checkedIds.join(',')}&start_id=${startNodeId}&end_id=${endNodeId}&rain_active=${rain}`;
                    if (hour !== null) {
                        url += `&target_hour=${hour}`;
                    }

                    const res = await fetch(url);
                    const data = await res.json();

                    if (routePolyline) {
                        map.removeLayer(routePolyline);
                    }

                    if (data.path && data.path.length > 0) {
                        // Plot safest route (Green polyline indicating safe passage)
                        routePolyline = L.polyline(data.path, {
                            color: '#10b981',
                            weight: 6,
                            opacity: 0.9,
                            shadowColor: '#10b981',
                            shadowBlur: 10
                        }).addTo(map);

                        map.fitBounds(routePolyline.getBounds(), { padding: [50, 50] });

                        document.getElementById('routeResults').style.display = 'block';
                        document.getElementById('routeDangerVal').innerText = data.hazard_score.toFixed(2);
                    } else {
                        alert("No se pudo encontrar ninguna ruta que conecte los dos nodos indicados.");
                    }
                } catch (err) {
                    console.error("Routing error:", err);
                    alert("Ocurrió un error al calcular la ruta.");
                } finally {
                    hideLoading();
                }
            });
        }

        function showLoading(text) {
            document.getElementById('loadingText').innerText = text;
            document.getElementById('loadingOverlay').classList.add('active');
        }

        function hideLoading() {
            document.getElementById('loadingOverlay').classList.remove('active');
        }

        // Initialize App
        window.addEventListener('load', () => {
            initMap();
            setupEventListeners();
            fetchDataset();
        });
    </script>
</body>
</html>
